<!-- Add Class Modal -->
<div class="modal fade" id="addClassModal" tabindex="-1" aria-labelledby="addClassModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addClassModalLabel">
                    <i class="fas fa-school me-2"></i>Add New Class
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="POST" action="{{ url_for('add_class') }}" class="needs-validation" novalidate>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="className" class="form-label">
                                <i class="fas fa-school me-2"></i>Class Name
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="className" 
                                   name="name" 
                                   placeholder="Enter class name (e.g., BCA)"
                                   required>
                            <div class="invalid-feedback">
                                Please provide a valid class name.
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="classSection" class="form-label">
                                <i class="fas fa-layer-group me-2"></i>Section
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="classSection" 
                                   name="section" 
                                   placeholder="Enter section (e.g., 5th Semester)"
                                   required>
                            <div class="invalid-feedback">
                                Please provide a valid section.
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-3">
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>
                            Example: Class Name: "BCA", Section: "5th Semester"
                        </small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>Cancel
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-plus me-2"></i>Add Class
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
