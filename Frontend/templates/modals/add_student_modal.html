<!-- Add Student Modal -->
<div class="modal fade" id="addStudentModal" tabindex="-1" aria-labelledby="addStudentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="addStudentModalLabel">
                    <i class="fas fa-user-graduate me-2"></i>Add New Student
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form method="POST" action="{{ url_for('add_student') }}" class="needs-validation" novalidate>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="studentName" class="form-label">
                                <i class="fas fa-user me-2"></i>Student Name
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="studentName" 
                                   name="name" 
                                   placeholder="Enter student full name"
                                   required>
                            <div class="invalid-feedback">
                                Please provide a valid student name.
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="rollNo" class="form-label">
                                <i class="fas fa-id-card me-2"></i>Roll Number
                            </label>
                            <input type="text" 
                                   class="form-control" 
                                   id="rollNo" 
                                   name="roll_no" 
                                   placeholder="Enter unique roll number"
                                   required>
                            <div class="invalid-feedback">
                                Please provide a valid roll number.
                            </div>
                        </div>
                        <div class="col-12">
                            <label for="studentClass" class="form-label">
                                <i class="fas fa-school me-2"></i>Class
                            </label>
                            <select class="form-select" id="studentClass" name="class_id" required>
                                <option value="">Select Class</option>
                                {% for class in classes %}
                                <option value="{{ class.id }}">{{ class.name }} - {{ class.section }}</option>
                                {% endfor %}
                            </select>
                            <div class="invalid-feedback">
                                Please select a class.
                            </div>
                        </div>
                    </div>
                    
                    {% if not classes %}
                    <div class="alert alert-warning mt-3">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        <strong>No classes available!</strong> Please add a class first before adding students.
                    </div>
                    {% else %}
                    <div class="mt-3">
                        <small class="text-muted">
                            <i class="fas fa-info-circle me-1"></i>
                            Example: Name: "John Doe", Roll No: "BCA001"
                        </small>
                    </div>
                    {% endif %}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fas fa-times me-2"></i>Cancel
                    </button>
                    <button type="submit" class="btn btn-primary" {{ 'disabled' if not classes }}>
                        <i class="fas fa-plus me-2"></i>Add Student
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
