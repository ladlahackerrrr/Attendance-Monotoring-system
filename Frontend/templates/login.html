<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | NIELIT Attendance Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:'Inter',sans-serif;
    min-height:100vh;
    background:
        linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.65)),
        url("{{ url_for('static', filename='images/college-background.jpg') }}")
        center/cover no-repeat fixed;
    transition:.3s;
}

/* LIGHT MODE */
body.light{
    background:
        linear-gradient(rgba(255,255,255,.75),rgba(255,255,255,.9)),
        url("{{ url_for('static', filename='images/college-background.jpg') }}")
        center/cover no-repeat fixed;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    padding:14px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:rgba(0,0,0,.4);
    backdrop-filter:blur(12px);
    z-index:1000;
}
body.light .navbar{
    background:rgba(255,255,255,.9);
}

/* LOGO ONLY (NO TEXT) */
.logo{
    height:75px;
    width:auto;
    background:transparent;
    object-fit:contain;
}
@media(max-width:768px){
    .logo{
        height:55px;
    }
}

/* NAV LINKS */
.nav-links{
    display:flex;
    align-items:center;
}
.nav-links a{
    color:#e5e5e5;
    margin:0 12px;
    text-decoration:none;
    font-size:14px;
}
body.light .nav-links a{
    color:#111;
}
.nav-links a:hover{
    color:#fff;
}
body.light .nav-links a:hover{
    color:#000;
}

.login-nav-btn{
    border:1px solid rgba(255,255,255,.3);
    padding:6px 16px;
    border-radius:20px;
}

.mode-toggle{
    margin-left:15px;
    cursor:pointer;
    color:#fff;
}
body.light .mode-toggle{
    color:#111;
}

/* LOGIN CONTAINER */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding-top:110px;
}

/* LOGIN ANIMATION */
@keyframes loginFadeIn{
    from{opacity:0;transform:scale(.92) translateY(20px);}
    to{opacity:1;transform:scale(1) translateY(0);}
}

/* LOGIN CARD */
.login-card{
    width:420px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(22px);
    border-radius:18px;
    padding:35px;
    color:#fff;
    box-shadow:0 30px 60px rgba(0,0,0,.45);
    animation:loginFadeIn .6s ease-out;
    position:relative;
}
body.light .login-card{
    background:rgba(255,255,255,.95);
    color:#111;
}

/* FORM */
.form-group{
    margin-bottom:18px;
    position:relative;
}
.form-group i{
    position:absolute;
    left:14px;
    top:50%;
    transform:translateY(-50%);
    opacity:.7;
}
.toggle-eye{
    position:absolute;
    right:14px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    opacity:.7;
}
.form-group input{
    width:100%;
    padding:14px 44px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,.15);
    color:#fff;
}
body.light .form-group input{
    background:rgba(0,0,0,.08);
    color:#111;
}

/* =============================== */
/* PASSWORD EYE ICON – FINAL FIX */
/* =============================== */

.password-group {
    position: relative;
}

/* give space for eye */
.password-group input {
    padding-right: 52px !important;
}

/* override generic icon rule */
.password-group .toggle-eye {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    opacity: 0.7;
    z-index: 5;
}

/* prevent eye from behaving like left icon */
.password-group .toggle-eye i {
    position: static !important;
    transform: none !important;
}

/* hover effect */
.password-group .toggle-eye:hover {
    opacity: 1;
}

/* light mode */
body.light .password-group .toggle-eye {
    color: #111;
}



/* LOGIN BUTTON */
.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    font-weight:600;
    background:linear-gradient(135deg,#3b82f6,#1e40af);
    color:#fff;
    cursor:pointer;
}

/* DEMO */
.demo-item{
    display:flex;
    justify-content:space-between;
    background:rgba(255,255,255,.12);
    padding:10px;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:8px;
}
.demo-item:hover{
    background:rgba(255,255,255,.22);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <img src="{{ url_for('static', filename='images/nielit-logo.png') }}" class="logo">

    <div class="nav-links">
        <a href="https://www.nielit.gov.in/agartala/index.php" target="_blank">Home</a>
        <a href="https://www.nielit.gov.in/agartala/index.php" target="_blank">About</a>
        <a href="https://www.nielit.gov.in/agartala/index.php" target="_blank">Services</a>
        <a href="https://www.nielit.gov.in/agartala/index.php" target="_blank">Contact</a>
        <span class="login-nav-btn">Login</span>
        <i class="fas fa-moon mode-toggle" id="modeToggle"></i>
    </div>
</div>

<!-- LOGIN -->
<div class="container">
<div class="login-card">

    <h2 style="text-align:center;">Login</h2>
    <p style="text-align:center;opacity:.85;margin-bottom:25px;">Welcome back! Please sign in</p>

    <form method="POST">
        <div class="form-group">
            <i class="fas fa-envelope"></i>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

        </div>

        <div class="form-group password-group">
            <i class="fas fa-lock"></i>
            <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Enter your password" 
            required
            >
            <span class="toggle-eye" id="togglePassword">
                <i class="fas fa-eye"></i>
            </span>
        </div>

        <button class="login-btn">Login</button>
    </form>

    

</div>
</div>

<script>
/* Password fill ONLY when password field is clicked */
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");

passwordInput.addEventListener("focus", () => {
    const email = emailInput.value.trim().toLowerCase();

    if (passwordInput.value === "") {
        if (email === "admin@school.com") {
            passwordInput.value = "admin123";
        } 
        else if (email.endsWith("@school.com")) {
            passwordInput.value = "teacher123";
        }
    }
});


/* Password toggle */
document.getElementById("togglePassword").onclick=()=>{
    const p=document.getElementById("password");
    p.type=p.type==="password"?"text":"password";
};

/* Dark / Light */
const modeToggle=document.getElementById("modeToggle");
modeToggle.onclick=()=>{
    document.body.classList.toggle("light");
    modeToggle.classList.toggle("fa-moon");
    modeToggle.classList.toggle("fa-sun");
};
</script>

</body>
</html>
